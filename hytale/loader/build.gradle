plugins {
    alias(libs.plugins.shadow)
}

dependencies {
    implementation project(':api')
    implementation project(':common:loader-utils')

    compileOnly "com.hypixel.hytale:Server:${hytaleVersion}"
}

repositories {
    maven { url 'https://maven.hytale.com/release/' }
}

processResources {
    filesMatching('manifest.json') {
        expand (
                'pluginVersion': project.ext.fullVersion,
                'hytaleVersion': hytaleVersion
        )
    }
}

shadowJar {
    archiveFileName = "LuckPerms-Hytale-${project.ext.fullVersion}.jar"

    from {
        project(':hytale').tasks.shadowJar.archiveFile
    }
}

artifacts {
    archives shadowJar
}
